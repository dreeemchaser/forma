services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: forma
      POSTGRES_USER: forma
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'forma']
      interval: 5s
      retries: 5

  backend:
    build: ./api
    ports:
      - '8080:8080'
    environment:
      # Match the variable names read by application.yaml
      DB_URL: jdbc:postgresql://postgres:5432/forma
      DB_USERNAME: forma
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      AI_PROVIDER: ${AI_PROVIDER}
      AI_API_KEY: ${AI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - '3000:80'
    depends_on:
      - backend

volumes:
  pgdata: